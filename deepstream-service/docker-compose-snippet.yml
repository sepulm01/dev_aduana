# Docker Compose snippet — Replace the deepstream-yolo entry in docker-compose.yml
#
# El nuevo servicio deepstream-yolo reemplaza al viejo deepstream-app.
# Ya no usa `deepstream-app -c config.txt` — usa el binario C++ compilado
# `deepstream-security-app` con configuración via YAML.

  deepstream-yolo:
    build: ./deepstream-service
    restart: unless-stopped
    volumes:
      # Carpeta con configs (app_config.yml, Triton configs, labels, tracker YAML)
      - ./deepstream-service/app/config:/opt/deepstream-config:ro
      # Donde se graba video (si output_video_file está definido en app_config.yml)
      - ds_output:/opt/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy

# Volumes (agregar al final del archivo, junto a postgres_data y redis_data)
# ds_output: