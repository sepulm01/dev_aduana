<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MediaMTX Manager{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'vendor/tabler/tabler.min.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/tabler-icons/tabler-icons.min.css' %}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300c4cc' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M19 7c-.88 0-1.67.34-2.26.9A3 3 0 0 0 15 13a3 3 0 0 0 2.24-1.1A2.5 2.5 0 0 0 19 7z'/><path d='M10 7a2 2 0 1 0 0 4 2 2 0 0 0 0-4z'/><path d='M5 7a2 2 0 1 0 0 4 2 2 0 0 0 0-4z'/><path d='M10 17v3'/><path d='M10 20H5a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h5'/><path d='M19 7v10'/><path d='M19 17h2a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1h-2'/><path d='M5 7a2 2 0 1 0 4 0 2 2 0 0 0-4 0'/><path d='M14 12h4'/><path d='M14 9h4'/><path d='M14 15h4'/><path d='M14 18h4'/></svg>">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="antialiased">
    <div class="wrapper">
        <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <a class="navbar-brand py-3" href="/">
                    <i class="ti ti-video me-2" style="font-size:1.5rem;color:#00c4cc;"></i>
                    <span class="fw-bold">STSecurity</span>
                </a>
                <div class="collapse navbar-collapse" id="navbar-menu">
                    <ul class="navbar-nav pt-lg-3">
                        <li class="nav-item">
                            <a class="nav-link" href="/">
                                <i class="ti ti-layout-grid nav-link-icon"></i>
                                <span class="nav-link-title">Dispositivos</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/discover/">
                                <i class="ti ti-search nav-link-icon"></i>
                                <span class="nav-link-title">Descubrir</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </aside>
        <div class="page-wrapper">
            <div class="page-body">
                <div class="container-fluid">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'vendor/tabler/tabler.min.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
