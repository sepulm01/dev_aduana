{% extends "base.html" %}
{% block title %}Descubrir Dispositivos{% endblock %}
{% block content %}
<div class="page-header">
    <div class="row align-items-center">
        <div class="col">
            <div class="page-pretitle">Network Scanner</div>
            <h2 class="page-title"><i class="ti ti-search me-2"></i>Descubrir Dispositivos</h2>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Agregar manualmente</h3>
            </div>
    <div class="card-body">
        <form id="manualForm" onsubmit="return addManual(event)">
            <div class="row">
                <div class="col-md-4 mb-2">
                    <input type="text" class="form-control" id="host" placeholder="Host / IP" required>
                </div>
                <div class="col-md-2 mb-2">
                    <input type="number" class="form-control" id="port" value="80" placeholder="Puerto">
                </div>
                <div class="col-md-3 mb-2">
                    <input type="text" class="form-control" id="user" placeholder="Usuario">
                </div>
                <div class="col-md-3 mb-2">
                    <input type="password" class="form-control" id="pass" placeholder="Contraseña">
                </div>
            </div>
            <div class="d-flex gap-2 mt-2">
                <button type="submit" class="btn btn-success">
                    <i class="ti ti-plus me-2"></i>Agregar
                </button>
                <button type="button" class="btn btn-outline-warning" onclick="probeIP()">
                    <i class="ti ti-test me-2"></i>Probar conexión
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function addManual(e) {
    e.preventDefault();
    try {
        const resp = await fetch('/api/devices/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value) || 80,
                username: document.getElementById('user').value,
                password: document.getElementById('pass').value,
            }),
        });
        const data = await resp.json();
        if (data.ok) {
            window.location.href = '/devices/' + data.id + '/';
        } else {
            alert('Error: ' + (data.error || 'No se pudo agregar el dispositivo'));
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
    return false;
}

async function probeIP() {
    try {
        const resp = await fetch('/api/probe/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value) || 80,
            }),
        });
        const data = await resp.json();
        alert(data.found ? 'ONVIF encontrado en ' + data.url : 'No se encontró servicio ONVIF');
    } catch (e) {
        alert('Error: ' + e.message);
    }
}
</script>
{% endblock %}
