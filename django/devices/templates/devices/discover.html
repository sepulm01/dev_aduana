{% extends "base.html" %}
{% block title %}Descubrir{% endblock %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-search"></i> Descubrir Dispositivos</h4>

<div class="mb-3">
    <button id="scanBtn" class="btn btn-primary" onclick="startDiscovery()">
        <i class="bi bi-wifi"></i> Escanear red
    </button>
</div>

<div id="results" class="d-none"></div>

<div class="card bg-black border-secondary mb-3">
    <div class="card-header"><h5 class="mb-0">Agregar manualmente</h5></div>
    <div class="card-body">
        <form id="manualForm" onsubmit="return addManual(event)">
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" class="form-control form-control-sm" id="host" placeholder="Host/IP" required>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control form-control-sm" id="port" value="80" placeholder="Puerto">
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control form-control-sm" id="user" placeholder="Usuario">
                </div>
                <div class="col-md-3">
                    <input type="password" class="form-control form-control-sm" id="pass" placeholder="Contraseña">
                </div>
            </div>
            <button type="submit" class="btn btn-sm btn-outline-info mt-2">Agregar</button>
            <button type="button" class="btn btn-sm btn-outline-warning mt-2 ms-1" onclick="probeIP()">Probar</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function startDiscovery() {
    const btn = document.getElementById('scanBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Escaneando...';

    try {
        const resp = await fetch('/api/discover/', { method: 'POST' });
        const devices = await resp.json();
        showResults(devices);
    } catch (e) {
        alert('Error: ' + e.message);
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-wifi"></i> Escanear red';
}

function showResults(devices) {
    const container = document.getElementById('results');
    container.classList.remove('d-none');

    if (devices.length === 0) {
        container.innerHTML = '<div class="alert alert-warning">No se encontraron dispositivos</div>';
        return;
    }

    container.innerHTML = '<h5 class="mb-2">Dispositivos encontrados:</h5>' +
    '<div class="list-group list-group-flush mb-3">' +
    devices.map((d, i) => {
        const host = d.xaddrs?.[0] || d.host || '';
        return `<div class="list-group-item bg-black text-light border-secondary">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <strong>${d.name || 'Desconocido'}</strong><br>
                    <small class="text-muted">${d.hardware || ''} — ${host}</small>
                </div>
                <button class="btn btn-sm btn-outline-success" onclick="addDiscovered(${i})">Agregar</button>
            </div>
        </div>`;
    }).join('') +
    '</div>';

    window._discoveredDevices = devices;
}

async function addDiscovered(index) {
    const devices = window._discoveredDevices || [];
    const d = devices[index];
    if (!d) return;

    const host = d.xaddrs?.[0] || d.host || '';
    try {
        const resp = await fetch('/api/devices/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: d.name || host,
                host: host,
                port: 80,
                xaddrs: d.xaddrs || [],
                scopes: d.scopes || [],
            }),
        });
        const data = await resp.json();
        if (data.ok) {
            window.location.href = '/devices/' + data.id + '/';
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

async function addManual(e) {
    e.preventDefault();
    try {
        const resp = await fetch('/api/devices/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value) || 80,
                username: document.getElementById('user').value,
                password: document.getElementById('pass').value,
            }),
        });
        const data = await resp.json();
        if (data.ok) {
            window.location.href = '/devices/' + data.id + '/';
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
    return false;
}

async function probeIP() {
    try {
        const resp = await fetch('/api/probe/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value) || 80,
            }),
        });
        const data = await resp.json();
        alert(data.found ? 'ONVIF encontrado en ' + data.url : 'No se encontró servicio ONVIF');
    } catch (e) {
        alert('Error: ' + e.message);
    }
}
</script>
{% endblock %}
