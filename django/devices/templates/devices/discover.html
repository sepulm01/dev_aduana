{% extends "base.html" %}
{% block title %}Descubrir Dispositivos{% endblock %}
{% block content %}
<div class="page-header">
    <div class="row align-items-center">
        <div class="col">
            <div class="page-pretitle">Network Scanner</div>
            <h2 class="page-title"><i class="ti ti-search me-2"></i>Descubrir Dispositivos</h2>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card mb-3">
            <div class="card-header">
                <h3 class="card-title">Escanear red local</h3>
            </div>
            <div class="card-body">
                <button id="scanBtn" class="btn btn-primary" onclick="startDiscovery()">
                    <i class="ti ti-wifi me-2"></i>Escanear red
                </button>
            </div>
        </div>
    </div>
</div>

<div id="results" class="d-none">
    <div class="card mb-3">
        <div class="card-header">
            <h3 class="card-title">Dispositivos encontrados</h3>
        </div>
        <div class="card-body">
            <div id="results-list"></div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3 class="card-title">Agregar manualmente</h3>
    </div>
    <div class="card-body">
        <form id="manualForm" onsubmit="return addManual(event)">
            <div class="row">
                <div class="col-md-4 mb-2">
                    <input type="text" class="form-control" id="host" placeholder="Host / IP" required>
                </div>
                <div class="col-md-2 mb-2">
                    <input type="number" class="form-control" id="port" value="80" placeholder="Puerto">
                </div>
                <div class="col-md-3 mb-2">
                    <input type="text" class="form-control" id="user" placeholder="Usuario">
                </div>
                <div class="col-md-3 mb-2">
                    <input type="password" class="form-control" id="pass" placeholder="Contraseña">
                </div>
            </div>
            <div class="d-flex gap-2 mt-2">
                <button type="submit" class="btn btn-success">
                    <i class="ti ti-plus me-2"></i>Agregar
                </button>
                <button type="button" class="btn btn-outline-warning" onclick="probeIP()">
                    <i class="ti ti-test me-2"></i>Probar conexión
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function startDiscovery() {
    const btn = document.getElementById('scanBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Escaneando...';

    try {
        const resp = await fetch('/api/discover/', { method: 'POST' });
        const devices = await resp.json();
        showResults(devices);
    } catch (e) {
        alert('Error: ' + e.message);
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-wifi me-2"></i>Escanear red';
}

function showResults(devices) {
    const container = document.getElementById('results');
    const list = document.getElementById('results-list');
    container.classList.remove('d-none');

    if (!devices || devices.length === 0) {
        list.innerHTML = '<div class="alert alert-warning"><i class="ti ti-alert-triangle me-2"></i>No se encontraron dispositivos</div>';
        return;
    }

    list.innerHTML = '<div class="list-group list-group-flush">' +
    devices.map((d, i) => {
        const host = d.xaddrs?.[0] || d.host || '';
        return `<div class="list-group-item">
            <div class="row align-items-center">
                <div class="col">
                    <div class="fw-bold">${d.name || 'Desconocido'}</div>
                    <div class="text-muted">${d.hardware || ''} — ${host}</div>
                </div>
                <div class="col-auto">
                    <button class="btn btn-success btn-icon" onclick="addDiscovered(${i})" title="Agregar">
                        <i class="ti ti-plus"></i>
                    </button>
                </div>
            </div>
        </div>`;
    }).join('') +
    '</div>';

    window._discoveredDevices = devices;
}

async function addDiscovered(index) {
    const devices = window._discoveredDevices || [];
    const d = devices[index];
    if (!d) return;

    const host = d.xaddrs?.[0] || d.host || '';
    try {
        const resp = await fetch('/api/devices/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: d.name || host,
                host: host,
                port: 80,
                xaddrs: d.xaddrs || [],
                scopes: d.scopes || [],
            }),
        });
        const data = await resp.json();
        if (data.ok) {
            window.location.href = '/devices/' + data.id + '/';
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

async function addManual(e) {
    e.preventDefault();
    try {
        const resp = await fetch('/api/devices/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value) || 80,
                username: document.getElementById('user').value,
                password: document.getElementById('pass').value,
            }),
        });
        const data = await resp.json();
        if (data.ok) {
            window.location.href = '/devices/' + data.id + '/';
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
    return false;
}

async function probeIP() {
    try {
        const resp = await fetch('/api/probe/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value) || 80,
            }),
        });
        const data = await resp.json();
        alert(data.found ? 'ONVIF encontrado en ' + data.url : 'No se encontró servicio ONVIF');
    } catch (e) {
        alert('Error: ' + e.message);
    }
}
</script>
{% endblock %}
