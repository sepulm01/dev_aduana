{% with sfx=suffix|default:"" %}
<div class="card bg-black border-secondary">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">
            <i class="bi bi-broadcast"></i>
            <!-- <span id="streamStatus{{ sfx }}" class="text-warning">Conectando...</span> -->
        </h5>
        <div>
            {% if ptz_supported %}
            <button id="fullscreenBtn{{ sfx }}"
                class="btn btn-sm btn-outline-light ms-1"
                onclick="toggleFullscreen('{{ sfx }}')">
                <i class="bi bi-arrows-fullscreen"></i>
            </button>
            <button id="ptzToggleBtn{{ sfx }}"
                class="btn btn-sm btn-outline-warning ms-1"
                onclick="window.ptzCtrl{{ sfx }}.togglePtzMode()">
                <i class="bi bi-arrows-move"></i> PTZ
            </button>
            {% endif %}
        </div>
    </div>
    <div class="card-body p-0 bg-black">
        <div id="videoContainer{{ sfx }}" style="position: relative; width: 100%; aspect-ratio: 16 / 9; display: {% if profile_token %}block{% else %}none{% endif %};">
            <iframe id="videoFrame{{ sfx }}"
                src="{% if webrtc_url %}{{ webrtc_url }}{% endif %}"
                style="width: 100%; height: 100%; border: 0; position: absolute; top: 0; left: 0;"
                allow="autoplay; encrypted-media"
                allowfullscreen>
            </iframe>
            <div id="ptzOverlay{{ sfx }}"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; display: none;">
            </div>
        </div>
        <div id="noVideo{{ sfx }}" class="align-items-center justify-content-center text-muted" style="aspect-ratio: 16 / 9; display: {% if profile_token %}none{% else %}flex{% endif %};">
            <div class="text-center">
                <i class="bi bi-camera-video-off" style="font-size: 4rem;"></i>
                <p class="mt-2">{{ no_video_text|default:"Selecciona un perfil y presiona Live" }}</p>
            </div>
        </div>
    </div>
</div>
{% endwith %}
