name:  mediamtx-manager

services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediamtx -d mediamtx_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - /var/www/dev_security/videos:/opt/videos:ro
    ports:
      - "8554:8554"
      - "8889:8889"
      - "9997:9997"
      - "8189:8189/udp"

  django-http:
    build: ./django
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - DEEPSTREAM_ANALYTICS_CONFIG=/opt/deepstream-app/config/config_nvdsanalytics.txt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models:ro
      - ./deepstream-service/app/config:/opt/deepstream-app/config:rw
      - ./django/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  django-asgi:
    build: ./django
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - DEEPSTREAM_ANALYTICS_CONFIG=/opt/deepstream-app/config/config_nvdsanalytics.txt
    volumes:
      - ./deepstream-service/app/config:/opt/deepstream-app/config:rw
      - ./computer_vision/config:/opt/deepstream-app/config:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./django
    command: celery -A config worker -l info
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./django
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  event-stream-service:
    build: ./event-stream-service
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://mediamtx:Ch4ngeM3!@postgres:5432/mediamtx_manager
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis-event-bridge:
    build: ./django
    command: python manage.py redis_event_bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  notification-bridge:
    build: ./django
    command: python manage.py notification_bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./django/media:/app/media
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  telegram-ack-poller:
    build: ./django
    command: python manage.py telegram_ack_poller
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  snapshot-receiver:
    build: ./django
    command: python manage.py snapshot_receiver
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:12349:12349"
    volumes:
      - ./django/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  face-receiver:
    build: ./django
    command: python manage.py face_receiver
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "127.0.0.1:12348:12348"
    volumes:
      - ./django/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  computer-vision:
    build: ./computer_vision
    restart: unless-stopped
    runtime: nvidia
    environment:
      - ENABLE_DISPLAY=${ENABLE_DISPLAY:-1}
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GST_DEBUG=1
      - no_proxy=*
      - NO_PROXY=*
      - GIO_USE_PROXY_RESOLVER=none
      - GIO_MODULE_DIR=/dev/null
      - DEEPSTREAM_SOURCES_KEY=deepstream:sources:main
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /var/www/dev_security/videos:/opt/videos:ro
      - /dev/dri:/dev/dri:rw
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models:ro

  # pipeline2: Face Recognition — retinaface_det10g PGIE + 2d106det SGIE0 + w600k_r50 SGIE1
  computer-vision-retinaface:
    build: ./computer_vision
    restart: unless-stopped
    runtime: nvidia
    environment:
      - ENABLE_DISPLAY=${ENABLE_DISPLAY:-0}
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GST_DEBUG=1
      - no_proxy=*
      - NO_PROXY=*
      - GIO_USE_PROXY_RESOLVER=none
      - GIO_MODULE_DIR=/dev/null
      - DEEPSTREAM_SOURCES_KEY=deepstream:sources:retinaface
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /var/www/dev_security/videos:/opt/videos:ro
      - /dev/dri:/dev/dri:rw
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models:ro
    command: ["../app/pipeline-test3", "./config_retinaface.yml"]

  # pipeline3: TrafficCamNet + LPD + LPR — License plate reading
  computer-vision-lpr:
    build: ./computer_vision
    restart: unless-stopped
    runtime: nvidia
    environment:
      - ENABLE_DISPLAY=1
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GST_DEBUG=1
      - no_proxy=*
      - NO_PROXY=*
      - GIO_USE_PROXY_RESOLVER=none
      - GIO_MODULE_DIR=/dev/null
      - DEEPSTREAM_SOURCES_KEY=deepstream:sources:trafficcamnet_lpr
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /var/www/dev_security/videos:/opt/videos:ro
      - /dev/dri:/dev/dri:rw
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models:rw
    command: ["../app/pipeline-test3", "./config_trafficcamnet_lpr.yml"]

  # pipeline4: YOLO v9 — PGIE only, uses DeepStream-Yolo custom lib
  computer-vision-yolov9:
    build: ./computer_vision
    restart: unless-stopped
    runtime: nvidia
    environment:
      - ENABLE_DISPLAY=${ENABLE_DISPLAY:-0}
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GST_DEBUG=1
      - no_proxy=*
      - NO_PROXY=*
      - GIO_USE_PROXY_RESOLVER=none
      - GIO_MODULE_DIR=/dev/null
      - DEEPSTREAM_SOURCES_KEY=deepstream:sources:yolov9
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /var/www/dev_security/videos:/opt/videos:ro
      - /dev/dri:/dev/dri:rw
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models:ro
    command: ["../app/pipeline-test3", "./config_yolov9.yml"]

  nginx:
    image: nginx:alpine
    volumes:
      - ./django/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./django/media:/usr/share/nginx/html/media:ro
    ports:
      - "80:80"
    depends_on:
      - django-http
      - django-asgi
      - mediamtx

volumes:
  postgres_data:
  redis_data:
  ds_output:
