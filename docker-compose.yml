name: mediamtx-manager

services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediamtx -d mediamtx_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"
      - "8889:8889"
      - "9997:9997"
      - "8189:8189/udp"

  django-http:
    build: ./django
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - DISCOVERY_SERVICE_URL=http://host.docker.internal:8765
      - DEEPSTREAM_ANALYTICS_CONFIG=/opt/deepstream-app/config/config_nvdsanalytics.txt
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deepstream-service/app/config:/opt/deepstream-app/config:rw
      - ./django/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  django-asgi:
    build: ./django
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - DEEPSTREAM_ANALYTICS_CONFIG=/opt/deepstream-app/config/config_nvdsanalytics.txt
    volumes:
      - ./deepstream-service/app/config:/opt/deepstream-app/config:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./django
    command: celery -A config worker -l info
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./django
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  discovery-service:
    build: ./discovery
    network_mode: host
    restart: unless-stopped
    environment:
      - DISCOVERY_PORT=8765

  event-stream-service:
    build: ./event-stream-service
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://mediamtx:Ch4ngeM3!@postgres:5432/mediamtx_manager
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis-event-bridge:
    build: ./django
    command: python manage.py redis_event_bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  face-receiver:
    build: ./django
    command: python manage.py face_receiver
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "127.0.0.1:12348:12348"
    volumes:
      - ./django/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # deepstream:
  #   build: ./deepstream-service
  #   restart: unless-stopped
  #   runtime: nvidia
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   environment:
  #     - MODEL=${MODEL:-yolo-v9}
  #     - DISPLAY=:1
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - NVIDIA_DRIVER_CAPABILITIES=all
  #     - GST_DEBUG=1
  #     - no_proxy=*
  #     - NO_PROXY=*
  #     - GIO_USE_PROXY_RESOLVER=none
  #     - GIO_MODULE_DIR=/dev/null
  #   volumes:
  #     - /tmp/.X11-unix:/tmp/.X11-unix:ro
  #     - ./deepstream-service/models:/opt/models
  #     - ./deepstream-service/worker:/opt/deepstream-app/worker:ro
  #     - /var/www/dev_security/videos:/opt/videos:ro
  #     - ds_output:/opt/output

  computer-vision:
    build: ./computer_vision
    restart: unless-stopped
    runtime: nvidia
    environment:
      - HEADLESS=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GST_DEBUG=1
      - no_proxy=*
      - NO_PROXY=*
      - GIO_USE_PROXY_RESOLVER=none
      - GIO_MODULE_DIR=/dev/null
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /var/www/dev_security/videos:/opt/videos:ro
      - /dev/dri:/dev/dri:rw

  nginx:
    image: nginx:alpine
    volumes:
      - ./django/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./django/media:/usr/share/nginx/html/media:ro
    ports:
      - "80:80"
    depends_on:
      - django-http
      - django-asgi
      - mediamtx

volumes:
  postgres_data:
  redis_data:
  ds_output:
