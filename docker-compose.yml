name: mediamtx-manager

services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediamtx -d mediamtx_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"
      - "8889:8889"
      - "9997:9997"
      - "8189:8189/udp"

  django-http:
    build: ./django
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - DISCOVERY_SERVICE_URL=http://host.docker.internal:8765
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  django-asgi:
    build: ./django
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./django
    command: celery -A config worker -l info
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./django
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  discovery-service:
    build: ./discovery
    network_mode: host
    restart: unless-stopped
    environment:
      - DISCOVERY_PORT=8765

  event-stream-service:
    build: ./event-stream-service
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://mediamtx:Ch4ngeM3!@postgres:5432/mediamtx_manager
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis-event-bridge:
    build: ./django
    command: python manage.py redis_event_bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  deepstream-yolo:
    build: ./deepstream-service
    restart: unless-stopped
    volumes:
      - ./deepstream-service/config:/opt/nvidia/deepstream/config:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: deepstream-app -c /opt/nvidia/deepstream/config/deepstream_app_config.txt

  nginx:
    image: nginx:alpine
    volumes:
      - ./django/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - django-http
      - django-asgi
      - mediamtx

volumes:
  postgres_data:
  redis_data: