name: aduana

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediamtx -d mediamtx_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    restart: unless-stopped
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
    ports:
      - "8554:8554"
      - "8889:8889"
      - "9997:9997"
      - "8189:8189/udp"

  django-http:
    build: ./django
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models
      - ./django/media:/app/media
      - ./django/static/img:/app/static/img:ro
      - ./mediamtx/mediamtx.yml:/app/mediamtx.yml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  django-asgi:
    build: ./django
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    volumes:
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./django
    restart: unless-stopped
    runtime: nvidia
    command: celery -A config worker -l info -Q celery,ocr
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models
      - ./django/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./django
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - MEDIAMTX_URL=http://mediamtx:8889
      - MEDIAMTX_API_URL=http://mediamtx:9997
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis-event-bridge:
    build: ./django
    command: python manage.py redis_event_bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./computer_vision/models:/opt/computer_vision/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  lc-bridge:
    build: ./django
    command: python manage.py lc_bridge
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./computer_vision/config:/opt/computer_vision/config:rw
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  crop-receiver:
    build: ./django
    command: python manage.py crop_receiver
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:12347:12347"
    volumes:
      - ./django/media:/app/media
      - ./computer_vision/models:/opt/computer_vision/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  computer-vision-aduana:
    image: aduana-computer-vision-aduana:latest
    build: ./computer_vision
    restart: unless-stopped
    runtime: nvidia
    environment:
      - ENABLE_DISPLAY=${ENABLE_DISPLAY:-0}
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GST_DEBUG=1
      - no_proxy=*
      - NO_PROXY=*
      - GIO_USE_PROXY_RESOLVER=none
      - GIO_MODULE_DIR=/dev/null
      - DEEPSTREAM_SOURCES_KEY=deepstream:sources:aduana:1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri:rw
      - ./computer_vision/config:/opt/computer_vision/config:rw
      - ./computer_vision/models:/opt/computer_vision/models
      - ./computer_vision/record:/opt/computer_vision/record
    command: ["../app/pipeline-test3", "./config_aduana.yml"]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./django/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./django/media:/usr/share/nginx/html/media:ro
    ports:
      - "80:80"
    depends_on:
      - django-http
      - django-asgi
      - mediamtx

  docling-server:
    image: ghcr.io/docling-project/docling-serve-cu130:v1.16.1
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    ports:
      - "5001:5001"

  ocr-vl:
    build: ./ocr_vl
    image: aduana-ocr-vl:latest
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HF_HOME=/app/.cache/huggingface
    ports:
      - "5002:5002"
    volumes:
      - ./ocr_vl/models:/app/.cache/huggingface

networks:
  default:
    ipam:
      config:
        - subnet: 172.23.0.0/16

volumes:
  postgres_data:
    name: mediamtx-manager_postgres_data
    external: true
  redis_data:
    name: mediamtx-manager_redis_data
    external: true
